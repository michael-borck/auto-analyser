# prism lens family configuration
# Copy to ~/.config/prism/config.yaml or ./prism.yaml and adjust.

lenses:
  document-lens:
    type: http
    url: http://localhost:8000
    formats:
      - .pdf
      - .docx
      - .pptx
      - .txt
      - .md
      - .qmd

  audio-lens:
    type: cli
    command: audio-lens
    formats:
      - .mp3
      - .wav
      - .m4a
      - .ogg
      - .flac
      - .aac

  data-lens:
    type: cli
    command: data-lens
    formats:
      - .csv
      - .tsv
      - .xlsx
      - .xls
      - .json
      - .yaml
      - .yml
      - .xml
      - .sqlite
      - .db
      - .parquet

  code-lens:
    type: http
    url: http://localhost:8001
    formats:
      - .py
      - .js
      - .ts
      - .tsx
      - .jsx
      - .java
      - .c
      - .cpp
      - .h
      - .rb
      - .php
      - .go
      - .rs
      - .ipynb
      - .html
      - .css

  video-lens:
    type: cli
    command: video-lens
    formats:
      - .mp4
      - .mov
      - .avi
      - .webm
      - .mkv
